		<script>
		// Lazy load GTM e Pinterest apos interacao do usuario ou 3s de idle
		// Reduz TBT (Total Blocking Time) significativamente
		(function() {
			var gtmLoaded = false;
			var pinterestLoaded = false;

			function loadGTM() {
				if (gtmLoaded) return;
				gtmLoaded = true;

				window.dataLayer = window.dataLayer || [];
				window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
				var f = document.getElementsByTagName('script')[0];
				var j = document.createElement('script');
				j.async = true;
				j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-PT885HFQ';
				f.parentNode.insertBefore(j, f);
			}

			function loadPinterest() {
				if (pinterestLoaded) return;
				pinterestLoaded = true;

				if (!window.pintrk) {
					window.pintrk = function() {
						window.pintrk.queue.push(Array.prototype.slice.call(arguments));
					};
					window.pintrk.queue = [];
					window.pintrk.version = "3.0";
				}
				var t = document.createElement("script");
				t.async = true;
				t.src = "https://s.pinimg.com/ct/core.js";
				t.onload = function() {
					pintrk('load', '2612738255823');
					pintrk('page');
				};
				document.head.appendChild(t);
			}

			function loadAllTrackers() {
				loadGTM();
				loadPinterest();
			}

			// Carregar apos interacao do usuario
			var events = ['scroll', 'click', 'touchstart', 'mousemove', 'keydown'];
			var loadOnce = function() {
				loadAllTrackers();
				events.forEach(function(e) { window.removeEventListener(e, loadOnce); });
			};
			events.forEach(function(e) { window.addEventListener(e, loadOnce, { once: true, passive: true }); });

			// Fallback: carregar apos 3 segundos de idle
			if ('requestIdleCallback' in window) {
				requestIdleCallback(loadAllTrackers, { timeout: 3000 });
			} else {
				setTimeout(loadAllTrackers, 3000);
			}
		})();
		</script>
