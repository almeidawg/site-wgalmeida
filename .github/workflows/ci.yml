name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Import Check
        run: npm run check:imports

      - name: Run Consistency Audit
        run: npm run audit:consistency

      - name: Run Consistency Audit (Strict)
        run: npm run audit:consistency:strict

      - name: Run tests
        run: npm run test:run

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

      - name: Build production
        run: npm run seo:validate:fresh

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
          retention-days: 5

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to production
        run: |
          echo "Deployment step - configure your deployment here"
          echo "Options:"
          echo "  - Vercel: https://vercel.com"
          echo "  - Netlify: https://netlify.com"
          echo "  - GitHub Pages: https://pages.github.com"
          echo "  - Custom server via FTP/SSH"
