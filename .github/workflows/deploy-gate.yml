name: DEPLOY GATE FINAL

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-gate-final:
    name: deploy-gate-final
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy gate verification
        run: npm run verify:full
